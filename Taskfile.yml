# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  cloud:
    silent: true
    dir: cloud
    dotenv:
      - .env
    cmds:
      - tofu apply -auto-approve

  cloud-plan:
    dir: cloud
    dotenv:
      - .env
    cmds:
      - tofu plan

  sync:
    silent: true
    cmds:
      - rsync -avz --delete --exclude "*.enc" server/. main@192.168.1.152:/home/main/config/
      - rsync -avz --delete --exclude "*.enc" gateway/. main@cloud.lxft.dev:/home/main/config

  encrypt:
    silent: true
    vars:
      FILES_RAW:
        sh: |
          find . -type f \( \
            -name "*.env" -o \
            -name "*.conf" -o \
            -name "secrets.nix" -o \
            -name "secrets.toml" -o \
            -name "publickey-*" -o \
            -name "privatekey-*" -o \
            -name "presharedkey-*" -o \
            -name "config.json" -o \
            -name "*.tfvars" -o \
            -name "*_SECRET" -o \
            -name "*.tfstate" -o \
            -name "*.tfstate.backup" -o \
            -name "livekit.yml" -o \
            -name "config.yaml" -o \
            -name "config.toml" -o \
            -name "configuration.yml" -o \
            -name "users_database.yml" \
          \) | grep -v backups | grep -v '\.enc$'
    cmds:
      - |
        {{range $file := .FILES_RAW | splitLines}}
        if [ ! -f "{{$file}}.enc" ] || [ "{{$file}}" -nt "{{$file}}.enc" ]; then
          echo "Encrypting {{$file}} → {{$file}}.enc"
          sops -e "{{$file}}" > "{{$file}}.enc"
          git add "{{$file}}.enc"
        else
          echo "Skipping {{$file}} (already encrypted)"
        fi
        {{end}}
