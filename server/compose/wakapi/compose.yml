volumes:
  wakapi-db:
  wakapi-data:

networks:
  infra:
    external: true

services:
  wakapi:
    image: ghcr.io/muety/wakapi:latest
    container_name: wakapi
    restart: always
    networks:
      - infra
    env_file:
      - app.env
      - db.env
      - smtp.env
    volumes:
      - wakapi-data:/data
    labels:
      traefik.enable: "true"
      traefik.http.routers.wakapi.entrypoints: "websecure"
      traefik.http.routers.wakapi.rule: "Host(`waka.lxft.dev`)"
      traefik.http.routers.wakapi.tls.certresolver: "le"
      traefik.http.services.wakapi.loadbalancer.server.port: "3000"
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    container_name: wakapi-db
    restart: always
    networks:
      - infra
    env_file:
      - db.env
    volumes:
      - wakapi-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 5s
