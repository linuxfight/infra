volumes:
  wakapi-db:
  wakapi-data:

services:
  wakapi:
    image: ghcr.io/muety/wakapi:latest
    container_name: wakapi
    restart: always
    env_file:
      - .env
    volumes:
      - wakapi-data:/data
    ports:
      - "127.0.0.1:13000:3000"
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    container_name: wakapi-db
    restart: always
    env_file:
      - .env
    volumes:
      - wakapi-db:/var/lib/postgresql
    ports:
      - "127.0.0.1:25433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 5s
