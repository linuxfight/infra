global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - target_label: instance
        replacement: "docker-host"

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]
