networks:
  infra:
    external: true

volumes:
  fj-data:
  fj-db:

services:
  server:
    image: codeberg.org/forgejo/forgejo:14
    container_name: forgejo
    env_file:
      - app.env
      - db.env
      - smtp.env
    restart: always
    networks:
      - infra
    volumes:
      - fj-data:/data
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "traefik.enable=true"

      # https
      - "traefik.http.routers.forgejo.entrypoints=websecure"
      - "traefik.http.routers.forgejo.rule=Host(`lab.lxft.dev`)"
      - "traefik.http.routers.forgejo.tls.certresolver=le"
      - "traefik.http.services.forgejo.loadbalancer.server.port=3000"
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    container_name: forgejo-db
    restart: always
    networks:
      - infra
    env_file:
      - db.env
      - smtp.env
    volumes:
      - fj-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 5s