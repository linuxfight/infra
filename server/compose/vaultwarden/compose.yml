volumes:
  vw-db:
  vw-data:

networks:
  infra:
    external: true

services:
  vaultwarden:
    image: vaultwarden/server:alpine
    container_name: vaultwarden
    restart: always
    networks:
      - infra
    env_file:
      - app.env
      - db.env
      - smtp.env
    volumes:
      - vw-data:/data
    labels:
      - "traefik.enable=true"

      # https
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.rule=Host(`vault.lxft.dev`)"
      - "traefik.http.routers.vaultwarden.tls.certresolver=le"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    container_name: vaultwarden-db
    restart: always
    networks:
      - infra
    env_file:
      - db.env
    volumes:
      - vw-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 50s