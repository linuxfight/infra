volumes:
  wv-db:
  wv-data:

services:
  vaultwarden:
    image: vaultwarden/server:alpine
    container_name: vaultwarden
    restart: always
    env_file:
      - .env
    volumes:
      - wv-data:/data
    ports:
      - "10080:80"
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    container_name: vaultwarden-db
    restart: always
    env_file:
      - .env
    volumes:
      - wv-db:/var/lib/postgresql
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 50s
